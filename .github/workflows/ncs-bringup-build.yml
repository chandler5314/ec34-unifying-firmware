name: NCS Unifying Bring-up Build

on:
  push:
    paths:
      - '.github/workflows/ncs-bringup-build.yml'
      - 'firmware/ec34u_unifying_bringup/**'
      - 'unifying-prototype/**'
  workflow_dispatch:
    inputs:
      ncs_ref:
        description: "nRF Connect SDK git ref"
        default: "v3.3.0"
        required: true
      board:
        description: "Zephyr board target"
        default: "nrf52840dk/nrf52840"
        required: true

jobs:
  ncs-bringup-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:latest
    env:
      NCS_REF: ${{ github.event.inputs.ncs_ref || 'v3.3.0' }}
      BOARD: ${{ github.event.inputs.board || 'nrf52840dk/nrf52840' }}
      ZEPHYR_SDK_VERSION: 0.17.4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p artifacts

      - name: Install build prerequisites and west
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            device-tree-compiler \
            file \
            ninja-build \
            python3-pip \
            python3-venv \
            wget \
            xz-utils
          python3 -m pip install --user --break-system-packages west
          export PATH="$HOME/.local/bin:$PATH"
          {
            west --version
            cmake --version | head -n 1
            ninja --version
          } | tee artifacts/tool-versions.txt

      - name: Install Zephyr SDK
        run: |
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz"
          tar -xJf "zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz"
          cd "zephyr-sdk-${ZEPHYR_SDK_VERSION}"
          bash ./setup.sh -t arm-zephyr-eabi -h -c
          echo "ZEPHYR_SDK_INSTALL_DIR=$PWD" >> "$GITHUB_ENV"
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> "$GITHUB_ENV"
          find "$PWD" -maxdepth 3 -name 'Zephyr-sdkConfig.cmake' -print | tee ../artifacts/zephyr-sdk-paths.txt

      - name: Initialize nRF Connect SDK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          west init -m https://github.com/nrfconnect/sdk-nrf --mr "$NCS_REF" ncs
          cd ncs
          west update --narrow -o=--depth=1
          west zephyr-export
          python3 -m pip install --user --break-system-packages -r zephyr/scripts/requirements.txt -r nrf/scripts/requirements.txt

      - name: Build EC34U Unifying bring-up app
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd ncs
          west build -b "$BOARD" ../firmware/ec34u_unifying_bringup

      - name: Collect firmware artifacts
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "run_id=${{ github.run_id }}"
            echo "head_sha=${{ github.sha }}"
            echo "ncs_ref=$NCS_REF"
            echo "board=$BOARD"
            echo "zephyr_sdk_version=$ZEPHYR_SDK_VERSION"
            echo "zephyr_sdk_install_dir=${ZEPHYR_SDK_INSTALL_DIR:-}"
            date -u
            python3 --version || true
            command -v west || true
            command -v cmake || true
            command -v ninja || true
            find "${ZEPHYR_SDK_INSTALL_DIR:-.}" -maxdepth 3 -name 'Zephyr-sdkConfig.cmake' -print 2>/dev/null || true
          } > artifacts/build-summary.txt
          cp -f ncs/build/zephyr/zephyr.hex artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.elf artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.map artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/.config artifacts/zephyr.config 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.dts artifacts/ 2>/dev/null || true
          cp -f ncs/build/CMakeCache.txt artifacts/ 2>/dev/null || true

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ec34u-unifying-bringup
          path: artifacts/
          if-no-files-found: warn
