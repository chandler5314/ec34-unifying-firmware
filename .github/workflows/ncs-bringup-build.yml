name: NCS Unifying Bring-up Build

on:
  push:
    paths:
      - '.github/workflows/ncs-bringup-build.yml'
      - 'firmware/ec34u_unifying_bringup/**'
      - 'unifying-prototype/**'
  workflow_dispatch:
    inputs:
      ncs_ref:
        description: "nRF Connect SDK git ref"
        default: "v3.3.0"
        required: true
      board:
        description: "Zephyr board target"
        default: "nrf52840dk/nrf52840"
        required: true

jobs:
  ncs-bringup-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:latest
    env:
      NCS_REF: ${{ github.event.inputs.ncs_ref || 'v3.3.0' }}
      BOARD: ${{ github.event.inputs.board || 'nrf52840dk/nrf52840' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p artifacts

      - name: Install Python tooling and west
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            apt-get update
            apt-get install -y python3-pip python3-venv
          fi
          python3 -m pip install --user --break-system-packages west
          export PATH="$HOME/.local/bin:$PATH"
          west --version | tee artifacts/west-version.txt

      - name: Initialize nRF Connect SDK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          west init -m https://github.com/nrfconnect/sdk-nrf --mr "$NCS_REF" ncs
          cd ncs
          west update --narrow -o=--depth=1
          west zephyr-export
          python3 -m pip install --user --break-system-packages -r zephyr/scripts/requirements.txt -r nrf/scripts/requirements.txt

      - name: Build EC34U Unifying bring-up app
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd ncs
          west build -b "$BOARD" ../firmware/ec34u_unifying_bringup

      - name: Collect firmware artifacts
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "run_id=${{ github.run_id }}"
            echo "head_sha=${{ github.sha }}"
            echo "ncs_ref=$NCS_REF"
            echo "board=$BOARD"
            date -u
            python3 --version || true
            command -v west || true
          } > artifacts/build-summary.txt
          cp -f ncs/build/zephyr/zephyr.hex artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.elf artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.map artifacts/ 2>/dev/null || true
          cp -f ncs/build/zephyr/.config artifacts/zephyr.config 2>/dev/null || true
          cp -f ncs/build/zephyr/zephyr.dts artifacts/zephyr.dts 2>/dev/null || true
          cp -f ncs/build/CMakeCache.txt artifacts/CMakeCache.txt 2>/dev/null || true

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ec34u-unifying-bringup
          path: artifacts/
          if-no-files-found: warn
