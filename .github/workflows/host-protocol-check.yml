name: Host Protocol Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  host-protocol-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure
        run: cmake -S . -B build/host -G Ninja

      - name: Build
        run: cmake --build build/host

      - name: Run smoke test
        run: |
          mkdir -p artifacts
          ./build/host/unifying-prototype/ec34u_protocol_smoke | tee artifacts/protocol-smoke-output.txt

      - name: Collect host artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp -f build/host/unifying-prototype/ec34u_protocol_smoke artifacts/ 2>/dev/null || true

      - name: Upload host artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ec34u-host-protocol-check
          path: artifacts/
          if-no-files-found: warn
